<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
@font-face {
  font-family: 'Geist';
  font-style: normal;
  font-weight: 100 900;
  font-display: swap;
  src: url(https://fonts.gstatic.com/s/geist/v3/gyByhwUxId8gMEwcGFWNOITd.woff2) format('woff2');
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: transparent;
  font-family: 'Geist', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.diagram {
  position: relative;
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 16px;
  gap: 0;
}

.svg-lines {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.svg-lines line {
  stroke: #FF5327;
  stroke-width: 1.5;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.svg-lines line.show { opacity: 1; }

.node {
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.4s ease;
  flex-shrink: 0;
  white-space: nowrap;
}
.node.show { opacity: 1; }

.ct-box {
  background: #FF5327;
  color: #fff;
  padding: 12px 18px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.batch-box {
  background: #fff;
  border: 1.5px dashed #C0C0C0;
  padding: 12px 18px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  color: #1A1A1A;
  letter-spacing: -0.01em;
}

.mid-box {
  background: #fff;
  border: 1.5px dashed #C0C0C0;
  padding: 10px 14px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  color: #1A1A1A;
  position: relative;
}
.mid-box::before {
  content: '';
  position: absolute;
  top: -5px; left: -5px; right: -5px; bottom: -5px;
  border: 1.5px dashed #C0C0C0;
  border-radius: 6px;
}

.vtxo-circle {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 1.5px dashed #C0C0C0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: #575757;
  background: #fff;
}

.spacer {
  width: 40px;
  flex-shrink: 0;
}

@media (prefers-color-scheme: dark) {
  body { background: #101013; }
  .batch-box { background: #fff; }
  .mid-box { background: #fff; }
  .vtxo-circle { background: #fff; }
}

@media (max-width: 640px) {
  .diagram {
    height: 100px;
    padding: 0 6px;
  }
  .ct-box {
    padding: 6px 6px;
    font-size: 6.5px;
    white-space: normal;
    text-align: center;
    line-height: 1.2;
    max-width: 60px;
  }
  .batch-box {
    padding: 6px 8px;
    font-size: 7px;
    border-radius: 12px;
  }
  .mid-box {
    padding: 5px 6px;
    font-size: 7px;
  }
  .mid-box::before {
    top: -3px; left: -3px; right: -3px; bottom: -3px;
  }
  .vtxo-circle {
    width: 42px;
    height: 42px;
    font-size: 8px;
  }
  .spacer { width: 14px; }
  .svg-lines line { stroke-width: 1; }
}
</style>
</head>
<body>

<div class="diagram" id="diagram">
  <svg class="svg-lines" id="svgLines"></svg>
  <div class="node" id="n0"><div class="ct-box">Commitment Transaction</div></div>
  <div class="spacer"></div>
  <div class="node" id="n1"><div class="batch-box">Batch Output</div></div>
  <div class="spacer"></div>
  <div class="node" id="n2"><div class="mid-box">A+B+C+D</div></div>
  <div class="spacer"></div>
  <div class="node" id="n3"><div class="mid-box">C+D</div></div>
  <div class="spacer"></div>
  <div class="node" id="n4"><div class="vtxo-circle">D</div></div>
</div>

<script>
(function() {
  var diagram = document.getElementById('diagram');
  var svg = document.getElementById('svgLines');
  var isMobile = window.matchMedia('(max-width: 640px)').matches;
  var arrowLen = isMobile ? 4 : 6;
  var arrowW = isMobile ? 3 : 4;

  function getPos(el) {
    var r = el.getBoundingClientRect();
    var d = diagram.getBoundingClientRect();
    return {
      left: r.left - d.left,
      right: r.right - d.left,
      midY: r.top + r.height / 2 - d.top
    };
  }

  function addLine(x1, y1, x2, y2, group) {
    var l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('x1', x1);
    l.setAttribute('y1', y1);
    l.setAttribute('x2', x2);
    l.setAttribute('y2', y2);
    if (group) l.setAttribute('data-group', group);
    svg.appendChild(l);
    return l;
  }

  function drawArrow(fromEl, toEl, group) {
    var f = getPos(fromEl);
    var t = getPos(toEl);
    var outerOffset = isMobile ? 3 : 5;
    var toChild = toEl.querySelector('.mid-box');
    var targetLeft = t.left;
    if (toChild) targetLeft = targetLeft - outerOffset;
    var fromChild = fromEl.querySelector('.mid-box');
    var sourceRight = f.right;
    if (fromChild) sourceRight = sourceRight + outerOffset;
    addLine(sourceRight, f.midY, targetLeft, t.midY, group);
    addLine(targetLeft - arrowLen, t.midY - arrowW, targetLeft, t.midY, group);
    addLine(targetLeft - arrowLen, t.midY + arrowW, targetLeft, t.midY, group);
  }

  function showGroup(group, delay) {
    setTimeout(function() {
      var lines = svg.querySelectorAll('[data-group="' + group + '"]');
      lines.forEach(function(l) { l.classList.add('show'); });
    }, delay);
  }

  function showEl(id, delay) {
    setTimeout(function() {
      document.getElementById(id).classList.add('show');
    }, delay);
  }

  function drawAll() {
    svg.innerHTML = '';
    drawArrow(document.getElementById('n0'), document.getElementById('n1'), 'g1');
    drawArrow(document.getElementById('n1'), document.getElementById('n2'), 'g2');
    drawArrow(document.getElementById('n2'), document.getElementById('n3'), 'g3');
    drawArrow(document.getElementById('n3'), document.getElementById('n4'), 'g4');
  }

  function run() {
    showEl('n0', 200);
    setTimeout(function() {
      drawAll();
      showGroup('g1', 100);
    }, 400);
    showEl('n1', 600);
    showGroup('g2', 900);
    showEl('n2', 1000);
    showGroup('g3', 1300);
    showEl('n3', 1400);
    showGroup('g4', 1700);
    showEl('n4', 1800);
  }

  if (typeof IntersectionObserver !== 'undefined') {
    var obs = new IntersectionObserver(function(entries) {
      if (entries[0].isIntersecting) { obs.disconnect(); run(); }
    }, { threshold: 0.3 });
    obs.observe(diagram);
  } else {
    run();
  }
})();
</script>
</body>
</html>
