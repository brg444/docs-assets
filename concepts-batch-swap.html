<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
@font-face {
  font-family: 'Geist';
  font-style: normal;
  font-weight: 100 900;
  font-display: swap;
  src: url(https://fonts.gstatic.com/s/geist/v3/gyByhwUxId8gMEwcGFWNOITd.woff2) format('woff2');
}
@font-face {
  font-family: 'Geist Mono';
  font-style: normal;
  font-weight: 100 900;
  font-display: swap;
  src: url(https://fonts.gstatic.com/s/geistmono/v3/or3yQ6H81JOCPFhYqdDhrClU5lLDA2a8iBMX.woff2) format('woff2');
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: transparent;
  font-family: 'Geist', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.card {
  background: #fff;
  border-radius: 12px;
  border: 1px solid #E8E8E8;
  overflow: hidden;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
}

.card-header {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  background: #FAFAFA;
  gap: 10px;
  border-bottom: 1px solid #E8E8E8;
}

.logo { width: 18px; height: 18px; flex-shrink: 0; }

.card-title {
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
  color: #999;
  flex: 1;
  letter-spacing: 0.02em;
}

.badge {
  padding: 3px 10px;
  border-radius: 4px;
  background: #381993;
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.pipeline {
  padding: 24px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  flex-wrap: wrap;
}

.step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.step-circle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1.5px solid #EBEBEB;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
  font-size: 14px;
  color: #C0C0C0;
}

.step-label {
  font-size: 9px;
  font-weight: 500;
  color: #C0C0C0;
  transition: color 0.3s ease;
  text-align: center;
}

.step-num {
  font-family: 'Geist Mono', monospace;
  font-size: 8px;
  color: #C0C0C0;
  transition: color 0.3s ease;
}

.step.active .step-circle {
  border-color: #381993;
  background: #381993;
  box-shadow: 0 0 0 4px rgba(56,25,147,0.1);
  transform: scale(1.1);
  color: #fff;
}
.step.active .step-label { color: #381993; font-weight: 600; }
.step.active .step-num { color: #381993; }

.step.done .step-circle {
  border-color: #381993;
  background: #fff;
  color: #381993;
}
.step.done .step-label { color: #575757; }
.step.done .step-num { color: #999; }

.step-connector {
  width: 24px;
  height: 1px;
  background: #EBEBEB;
  margin: 0 2px;
  margin-bottom: 20px;
  transition: background 0.3s ease;
}
.step-connector.done { background: #381993; opacity: 0.3; }

.check-svg { width: 14px; height: 14px; }

/* Result bar */
.result-bar {
  margin: 0 20px 16px;
  padding: 10px 14px;
  background: rgba(56,25,147,0.04);
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.result-bar.show { opacity: 1; transform: translateY(0); }

.result-icon {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #381993;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.result-text {
  font-size: 11px;
  font-weight: 600;
  color: #381993;
}

.result-detail {
  font-size: 10px;
  color: #999;
  margin-left: auto;
  font-family: 'Geist Mono', monospace;
}

/* Footer */
.footer {
  border-top: 1px solid #E8E8E8;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.progress-pip {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #EBEBEB;
  transition: background 0.3s ease;
}
.progress-pip.active { background: #381993; }
.progress-pip.done { background: #381993; opacity: 0.4; }

.footer-text {
  font-size: 10px;
  color: #999;
  font-family: 'Geist Mono', monospace;
  margin-left: auto;
}
.footer-text .count { font-weight: 600; color: #1A1A1A; }
.footer-text.final .count { color: #381993; }

@media (max-width: 640px) {
  .pipeline { padding: 16px 12px; gap: 0; }
  .step-circle { width: 28px; height: 28px; font-size: 11px; }
  .step-label { font-size: 7px; }
  .step-num { font-size: 7px; }
  .step-connector { width: 12px; }
  .result-bar { margin: 0 12px 12px; padding: 8px 10px; }
  .result-text { font-size: 9px; }
  .result-detail { font-size: 8px; }
  .card-title { font-size: 10px; }
  .card-header { padding: 10px 12px; }
  .footer { padding: 8px 12px; }
  .check-svg { width: 10px; height: 10px; }
}
</style>
</head>
<body>
<div class="card" id="panel">
  <div class="card-header">
    <svg class="logo" viewBox="0 0 35 35" fill="none">
      <path d="M0 8.75L8.75 0H26.25L35 8.75V17.5H26.25V8.75H8.75V17.5H0L0 8.75Z" fill="#381993"/>
      <path d="M8.75 26.25V17.5H26.25V26.25H8.75Z" fill="#381993"/>
      <path d="M8.75 26.25H0V35H8.75V26.25Z" fill="#381993"/>
      <path d="M26.25 26.25V35H35V26.25H26.25Z" fill="#381993"/>
    </svg>
    <span class="card-title">batch_swap::settle</span>
    <span class="badge">Atomic</span>
  </div>

  <div class="pipeline" id="pipeline"></div>

  <div class="result-bar" id="resultBar">
    <div class="result-icon">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <path d="M2 5.5L4 7.5L8 3" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="result-text">Settlement complete</span>
    <span class="result-detail">4 VTXOs anchored</span>
  </div>

  <div class="footer">
    <div id="pips"></div>
    <span class="footer-text" id="footerText">
      <span class="count" id="stepsDone">0</span> / 6 steps
    </span>
  </div>
</div>

<script>
(function() {
  var steps = [
    { label: 'Signal', icon: '○' },
    { label: 'Build', icon: '□' },
    { label: 'Construct', icon: '△' },
    { label: 'Forfeit', icon: '⊘' },
    { label: 'Sign', icon: '✎' },
    { label: 'Broadcast', icon: '◈' }
  ];

  var checkSvg = '<svg class="check-svg" viewBox="0 0 14 14" fill="none"><path d="M3 7.5L5.5 10L11 4" stroke="#381993" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  var pipeline = document.getElementById('pipeline');
  var pipsEl = document.getElementById('pips');
  var panel = document.getElementById('panel');
  var paused = false;

  // Build pipeline HTML
  steps.forEach(function(s, i) {
    var step = document.createElement('div');
    step.className = 'step';
    step.id = 'step' + i;
    step.innerHTML = '<div class="step-num">' + (i + 1) + '</div>' +
      '<div class="step-circle"><span class="step-icon">' + s.icon + '</span></div>' +
      '<div class="step-label">' + s.label + '</div>';
    pipeline.appendChild(step);

    if (i < steps.length - 1) {
      var conn = document.createElement('div');
      conn.className = 'step-connector';
      conn.id = 'conn' + i;
      pipeline.appendChild(conn);
    }

    var pip = document.createElement('div');
    pip.className = 'progress-pip';
    pip.id = 'pip' + i;
    pipsEl.appendChild(pip);
  });

  pipsEl.style.display = 'flex';
  pipsEl.style.gap = '4px';

  panel.addEventListener('mouseenter', function() { paused = true; });
  panel.addEventListener('mouseleave', function() { paused = false; });

  var STEP_DURATION = 500;
  var STEP_GAP = 200;

  function delay(ms) {
    return new Promise(function(resolve) {
      var elapsed = 0;
      function tick() {
        if (paused) { requestAnimationFrame(tick); return; }
        elapsed += 16;
        if (elapsed >= ms) resolve();
        else setTimeout(tick, 16);
      }
      setTimeout(tick, 16);
    });
  }

  function runAnimation() {
    var completed = 0;
    var chain = delay(300);

    steps.forEach(function(s, i) {
      chain = chain.then(function() {
        var el = document.getElementById('step' + i);
        var pip = document.getElementById('pip' + i);
        el.classList.add('active');
        pip.classList.add('active');

        return delay(STEP_DURATION).then(function() {
          el.classList.remove('active');
          el.classList.add('done');
          el.querySelector('.step-icon').innerHTML = checkSvg;
          pip.classList.remove('active');
          pip.classList.add('done');

          if (i > 0) {
            document.getElementById('conn' + (i - 1)).classList.add('done');
          }

          completed++;
          document.getElementById('stepsDone').textContent = completed;

          return delay(STEP_GAP);
        });
      });
    });

    chain.then(function() {
      document.getElementById('resultBar').classList.add('show');
      document.getElementById('footerText').classList.add('final');
    });
  }

  if (typeof IntersectionObserver !== 'undefined') {
    var obs = new IntersectionObserver(function(entries) {
      if (entries[0].isIntersecting) { obs.disconnect(); runAnimation(); }
    }, { threshold: 0.3 });
    obs.observe(panel);
  } else {
    runAnimation();
  }
})();
</script>
</body>
</html>
